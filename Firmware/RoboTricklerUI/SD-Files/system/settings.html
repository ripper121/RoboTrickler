<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="./resources/favicon.ico">
    <title data-i18n="titles.settings">Settings</title>
    <link rel="stylesheet" href="./resources/style.css">
    <script src="./lang.js"></script>
</head>

<body>
    <div class="card settings-card">
        <h2 data-i18n="config.title">Settings</h2>
        <form id="configForm">
            <fieldset>
                <legend data-i18n="config.wifi">WiFi Settings</legend>
                <label for="wifi_enabled" data-i18n="config.wifiEnabled">WiFi enabled:</label>
                <input type="checkbox" id="wifi_enabled" name="wifi_enabled" checked><br>

                <label for="wifi_ssid" data-i18n="config.ssid">Name / SSID:</label>
                <input type="text" id="wifi_ssid" name="wifi_ssid" maxlength="63" placeholder="MyWifiName"><br>

                <label for="wifi_psk" data-i18n="config.password">Password / PSK:</label>
                <input type="text" id="wifi_psk" name="wifi_psk" maxlength="63" placeholder="MyWifiPassword"><br>
                <fieldset>
                    <legend data-i18n="config.ipSettings">IP Settings (optional)</legend>
                    <label for="ipStatic" data-i18n="config.staticIp">Static IP:</label>
                    <input type="text" id="ipStatic" name="ipStatic" maxlength="15" size="15"
                        placeholder="192.168.178.100"><br>

                    <label for="ipGateway" data-i18n="config.gateway">Gateway:</label>
                    <input type="text" id="ipGateway" name="ipGateway" maxlength="15" size="15"
                        placeholder="192.168.178.1"><br>

                    <label for="ipSubnet" data-i18n="config.subnet">Subnet:</label>
                    <input type="text" id="ipSubnet" name="ipSubnet" maxlength="15" size="15"
                        placeholder="255.255.255.0"><br>

                    <label for="ipDns" data-i18n="config.dns">DNS:</label>
                    <input type="text" id="ipDns" name="ipDns" maxlength="15" size="15" placeholder="8.8.8.8"><br>
                </fieldset>
            </fieldset>

            <fieldset>
                <legend data-i18n="config.scale">Scale Settings</legend>
                <label for="scale_protocol" data-i18n="config.protocol">Protocol:</label>
                <select id="scale_protocol" name="scale_protocol">
                    <option value="GG" selected>G&G</option>
                    <option value="SBI">Sartorius</option>
                    <option value="KERN">Kern</option>
                    <option value="KERN-ABT">Kern ABT</option>
                    <option value="KERN-ABS">Kern ABS</option>
                    <option value="AD">A&D</option>
                    <option value="CUSTOM">Custom</option>
                    <option value="">None</option>
                </select><br>
                <label for="scale_baud" data-i18n="config.baud">Baud:</label>
                <input type="number" id="scale_baud" name="scale_baud" value="9600"><br>
                <div id="customRequestRow">
                    <label for="scale_customCode" data-i18n="config.customCode">Custom request (String in Hexformat 0x00):</label>
                    <input type="text" id="scale_customCode" name="scale_customCode" maxlength="31"
                        placeholder="0x1B 0x70 0x0D 0x0A"><br>
                </div>
            </fieldset>

            <fieldset>
                <legend data-i18n="config.stepper">Stepper Settings</legend>
                <label for="stepsPerRev" data-i18n="config.stepsPerRev">Steps per revolution:</label>
                <input type="number" id="stepsPerRev" name="stepsPerRev" value="200" min="1" step="1"><br>
            </fieldset>

            <fieldset>
                <legend data-i18n="config.general">General Settings</legend>
                <label for="beeper" data-i18n="config.beeper">Beeper:</label>
                <select id="beeper" name="beeper">
                    <option value="done" selected data-i18n="config.done">Done</option>
                    <option value="button" data-i18n="config.button">Button</option>
                    <option value="both" data-i18n="config.both">Both</option>
                    <option value="off" data-i18n="config.off">Off</option>
                </select><br>

                <label for="language" data-i18n="config.language">Language:</label>
                <select id="language" name="language">
                    <option value="en" selected data-i18n="config.english">English</option>
                    <option value="de" data-i18n="config.german">Deutsch</option>
                </select><br>

                <label for="profile_name" data-i18n="config.profile">Profile:</label>
                <input type="text" id="profile_name" name="profile_name" maxlength="31" value="calibrate"><br>

                <label for="trickle_counter" data-i18n="config.totalCounter">Trickle counter:</label>
                <input type="checkbox" id="trickle_counter" name="trickle_counter"><br>
                <input type="hidden" id="trickle_count" name="trickle_count" value="0">
            </fieldset>

            <fieldset>
                <legend data-i18n="config.firmwareUpdate">Firmware Update</legend>
                <label for="fw_check" data-i18n="config.firmwareCheck">Check for new Firmware:</label>
                <input type="checkbox" id="fw_check" name="fw_check" checked><br>
            </fieldset>

        </form>
        <h2 data-i18n="config.generated">Generated config.txt:</h2>
        <textarea id="jsonOutput"></textarea>
        <button id="downloadButton" class="button" data-i18n="config.download">Download</button>
        <button id="saveButton" class="button" data-i18n="config.save">Save</button><br>
        <button onClick='javascript:history.back()' class="button" data-i18n="nav.back">Back</button>

    </div>

    <script>
        const configForm = document.getElementById('configForm');
        const jsonOutput = document.getElementById('jsonOutput');
        const allowedScaleProtocols = ['GG', 'SBI', 'KERN', 'KERN-ABT', 'KERN-ABS', 'AD', 'CUSTOM', ''];
        const allowedBeepers = ['done', 'button', 'both', 'off'];
        const allowedLanguages = ['en', 'de'];

        function cleanText(value, fallback, maxLength) {
            var text = value === undefined || value === null ? fallback : String(value);
            return text.substring(0, maxLength);
        }

        function cleanOption(value, allowedValues, fallback) {
            return allowedValues.includes(value) ? value : fallback;
        }

        function cleanStepsPerRev(value) {
            var stepsPerRev = parseInt(value, 10);
            return stepsPerRev > 0 ? stepsPerRev : 200;
        }

        function updateCustomRequestVisibility() {
            document.getElementById('customRequestRow').style.display = configForm.scale_protocol.value === 'CUSTOM' ? 'block' : 'none';
        }

        function cleanConfigJSON(jsonObject) {
            var scaleProtocol = jsonObject.scale && Object.prototype.hasOwnProperty.call(jsonObject.scale, 'protocol') ? jsonObject.scale.protocol : 'GG';
            if (!allowedScaleProtocols.includes(scaleProtocol)) {
                scaleProtocol = 'GG';
            }
            var firmwareUpdate = jsonObject.firmwareUpdate || {};
            var totalCounter = jsonObject.totalCounter || {};
            var stepper = jsonObject.stepper || {};
            var profileName = cleanText(jsonObject.activeProfile || 'calibrate', 'calibrate', 31).trim();
            var customCode = scaleProtocol === 'CUSTOM' ? cleanText(jsonObject.scale && jsonObject.scale.customCode, '', 31) : '';
            return {
                wifi: {
                    enabled: !jsonObject.wifi || jsonObject.wifi.enabled !== false,
                    ssid: cleanText(jsonObject.wifi && jsonObject.wifi.ssid, '', 63),
                    psk: cleanText(jsonObject.wifi && jsonObject.wifi.psk, '', 63),
                    ipStatic: cleanText(jsonObject.wifi && jsonObject.wifi.ipStatic, '', 15),
                    ipGateway: cleanText(jsonObject.wifi && jsonObject.wifi.ipGateway, '', 15),
                    ipSubnet: cleanText(jsonObject.wifi && jsonObject.wifi.ipSubnet, '', 15),
                    ipDns: cleanText(jsonObject.wifi && jsonObject.wifi.ipDns, '', 15)
                },
                scale: {
                    protocol: scaleProtocol,
                    customCode: customCode,
                    baud: (jsonObject.scale && jsonObject.scale.baud) || 9600
                },
                stepper: {
                    stepsPerRev: cleanStepsPerRev(stepper.stepsPerRev)
                },
                activeProfile: profileName || 'calibrate',
                beeper: cleanOption(jsonObject.beeper, allowedBeepers, 'done'),
                language: cleanOption(jsonObject.language, allowedLanguages, 'en'),
                totalCounter: {
                    enable: totalCounter.enable === true,
                    count: Math.max(0, parseInt(totalCounter.count, 10) || 0)
                },
                firmwareUpdate: {
                    check: firmwareUpdate.check !== false
                }
            };
        }

        // Function to update JSON based on form data
        function formToJSON() {
            var formData = new FormData(configForm);
            var scaleProtocol = formData.get('scale_protocol');
            var jsonObject = {
                wifi: {
                    enabled: document.getElementById('wifi_enabled').checked,
                    ssid: formData.get('wifi_ssid'),
                    psk: formData.get('wifi_psk'),
                    ipStatic: formData.get('ipStatic'),
                    ipGateway: formData.get('ipGateway'),
                    ipSubnet: formData.get('ipSubnet'),
                    ipDns: formData.get('ipDns')
                },
                scale: {
                    protocol: scaleProtocol,
                    baud: parseInt(formData.get('scale_baud'), 10),
                    customCode: scaleProtocol === 'CUSTOM' ? formData.get('scale_customCode') : ''
                },
                stepper: {
                    stepsPerRev: cleanStepsPerRev(formData.get('stepsPerRev'))
                },
                activeProfile: (formData.get('profile_name') || 'calibrate').trim() || 'calibrate',
                beeper: formData.get('beeper'),
                language: formData.get('language'),
                totalCounter: {
                    enable: document.getElementById('trickle_counter').checked,
                    count: Math.max(0, parseInt(formData.get('trickle_count'), 10) || 0)
                },
                firmwareUpdate: {
                    check: document.getElementById('fw_check').checked
                }
            };
            jsonOutput.value = JSON.stringify(jsonObject, null, 4);
        }

        // Function to update form based on JSON data
        function jsonToForm() {
            try {
                var jsonObject = cleanConfigJSON(JSON.parse(jsonOutput.value));
                jsonOutput.value = JSON.stringify(jsonObject, null, 4);

                // Update WiFi settings
                configForm.wifi_enabled.checked = jsonObject.wifi.enabled !== false;
                configForm.wifi_ssid.value = jsonObject.wifi.ssid || '';
                configForm.wifi_psk.value = jsonObject.wifi.psk || '';
                configForm.ipStatic.value = jsonObject.wifi.ipStatic || '';
                configForm.ipGateway.value = jsonObject.wifi.ipGateway || '';
                configForm.ipSubnet.value = jsonObject.wifi.ipSubnet || '';
                configForm.ipDns.value = jsonObject.wifi.ipDns || '';

                // Update Scale settings
                configForm.scale_protocol.value = jsonObject.scale.protocol;
                configForm.scale_baud.value = jsonObject.scale.baud || 9600;
                configForm.scale_customCode.value = jsonObject.scale.customCode || '';
                updateCustomRequestVisibility();

                configForm.stepsPerRev.value = jsonObject.stepper.stepsPerRev || 200;
                configForm.beeper.value = jsonObject.beeper || 'done';
                configForm.language.value = jsonObject.language || 'en';
                configForm.profile_name.value = jsonObject.activeProfile || 'calibrate';
                configForm.trickle_counter.checked = jsonObject.totalCounter.enable === true;
                configForm.trickle_count.value = jsonObject.totalCounter.count || 0;
                configForm.fw_check.checked = jsonObject.firmwareUpdate.check !== false;

            } catch (e) {
                console.error('Invalid JSON');
            }
        }

        // Event listener for form changes
        configForm.addEventListener('input', formToJSON);
        configForm.scale_protocol.addEventListener('change', function () {
            updateCustomRequestVisibility();
            formToJSON();
        });

        // Event listener for JSON textarea changes
        jsonOutput.addEventListener('input', jsonToForm);
        jsonOutput.addEventListener('select', jsonToForm);

        // Initialize JSON output
        updateCustomRequestVisibility();
        formToJSON();

        document.getElementById('downloadButton').addEventListener('click', function () {
            var content = jsonOutput.value;
            var blob = new Blob([content], { type: 'text/plain' });
            var url = URL.createObjectURL(blob);

            // Create a temporary anchor and trigger the download
            var tempLink = document.createElement('a');
            tempLink.href = url;
            tempLink.download = 'config.txt';
            document.body.appendChild(tempLink);
            tempLink.click();
            document.body.removeChild(tempLink);

            // Revoke the URL after the download
            URL.revokeObjectURL(url);
        });

        document.getElementById('saveButton').addEventListener('click', function () {
            var content = jsonOutput.value;
            httpPost(content);
        });

        function httpGetProcessRequest() {
            if (xmlHttp.readyState == 4) {
                if (xmlHttp.status == 200) {
                    document.getElementById('jsonOutput').value = xmlHttp.responseText;
                    jsonToForm();
                }
            }
        }
        function httpGet(theUrl) {
            xmlHttp = new XMLHttpRequest();
            xmlHttp.onreadystatechange = httpGetProcessRequest;
            xmlHttp.open("GET", theUrl, true);
            xmlHttp.send(null);
        }

        //post
        function httpPostProcessRequest() {
            if (xmlHttp.readyState == 4) {
                if (xmlHttp.status == 200)
                    alert(window.rtT ? rtT('alerts.configSaved', "Config Saved!\nPlease reboot the Robo-Trickler to load new config.txt") : "Config Saved!\nPlease reboot the Robo-Trickler to load new config.txt");
                else
                    alert((window.rtT ? rtT('alerts.errorPrefix', 'ERROR') : "ERROR") + "[" + xmlHttp.status + "]: " + xmlHttp.responseText);
            }
        }
        function httpPost(data) {
            xmlHttp = new XMLHttpRequest();
            xmlHttp.onreadystatechange = httpPostProcessRequest;
            var formData = new FormData();
            formData.append("data", new Blob([data], { type: "text/json" }), "/config.txt");
            xmlHttp.open("POST", "/system/resources/edit");
            xmlHttp.send(formData);
        }

        window.addEventListener("load", (event) => {
            if (location.hostname === "localhost" || location.hostname === "127.0.0.1" || location.hostname === "" || location.hostname === "strenuous.dev") {
                document.getElementById("saveButton").style.display = "none";
            } else {
                httpGet("/config.txt");
                document.getElementById("downloadButton").style.display = "none";
            }
        });
    </script>
</body>

</html>
