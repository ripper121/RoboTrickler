<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="icon" type="image/x-icon" href="/system/resources/favicon.ico">
   <title data-i18n="titles.wifiSetup">Connect WiFi</title>
   <link rel="stylesheet" href="/system/resources/style.css">
   <script src="/system/lang.js"></script>
</head>

<body>
   <div class="card">
      <h1 data-i18n="wifiSetup.title">Connect WiFi</h1>
      <form id="wifi-form">
         <fieldset>
            <legend data-i18n="wifiSetup.settings">WiFi Settings</legend>
            <p data-i18n="wifiSetup.instructions">Select a network and enter its password.</p>

            <label for="ssid" data-i18n="wifiSetup.availableNetworks">Available networks:</label>
            <select id="ssid" name="ssid" required>
               <option value="" data-i18n="wifiSetup.scanning">Scanning...</option>
            </select><br>

            <label for="password" data-i18n="wifiSetup.password">Password / PSK:</label>
            <input id="password" name="password" type="password" maxlength="63"
               autocomplete="current-password"><br>

            <p id="status" data-i18n="wifiSetup.scanningNetworks">Scanning for WiFi networks...</p>
         </fieldset>

         <button class="button" type="button" id="refresh" data-i18n="wifiSetup.scanAgain">Scan again</button><br><br>
         <button class="button" type="submit" data-i18n="wifiSetup.saveConnect">Save and connect</button><br><br>
         <button class="button" type="button" onclick="window.location.href='/'" data-i18n="nav.back">Back</button>
      </form>
   </div>

   <script>
      const form = document.getElementById('wifi-form');
      const ssidSelect = document.getElementById('ssid');
      const passwordInput = document.getElementById('password');
      const statusText = document.getElementById('status');
      const refreshButton = document.getElementById('refresh');

      function translated(path, fallback) {
         return window.rtT ? window.rtT(path, fallback) : fallback;
      }

      async function scanNetworks() {
         refreshButton.disabled = true;
         statusText.textContent = translated('wifiSetup.scanningNetworks', 'Scanning for WiFi networks...');
         ssidSelect.innerHTML = '';
         ssidSelect.add(new Option(translated('wifiSetup.scanning', 'Scanning...'), ''));

         try {
            // The firmware scans asynchronously and answers 202 {"scanning":true}
            // until the result array is ready; poll until it arrives.
            let networks = null;
            for (let attempt = 0; attempt < 30; attempt++) {
               const response = await fetch('/api/wifi/scan', { cache: 'no-store' });
               if (!response.ok && response.status !== 202) {
                  throw new Error('Scan failed');
               }

               const data = await response.json();
               if (Array.isArray(data)) {
                  networks = data;
                  break;
               }
               await new Promise(function (resolve) { setTimeout(resolve, 1000); });
            }
            if (!networks) {
               throw new Error('Scan timed out');
            }

            networks.sort((a, b) => b.rssi - a.rssi);
            ssidSelect.innerHTML = '';
            ssidSelect.add(new Option(translated('wifiSetup.selectNetwork', 'Select a network'), ''));

            networks.forEach(function (network) {
               if (!network.ssid) {
                  return;
               }

               const option = document.createElement('option');
               option.value = network.ssid;
               option.textContent = network.ssid + ' (' + network.rssi + ' dBm)';
               ssidSelect.appendChild(option);
            });

            statusText.textContent = networks.length
               ? translated('wifiSetup.selectWifi', 'Select your WiFi network.')
               : translated('wifiSetup.noneFound', 'No WiFi networks found.');
         } catch (error) {
            ssidSelect.innerHTML = '';
            ssidSelect.add(new Option(translated('wifiSetup.scanFailed', 'Scan failed'), ''));
            statusText.textContent = translated('wifiSetup.scanTryAgain', 'Could not scan WiFi networks. Try again.');
         } finally {
            refreshButton.disabled = false;
         }
      }

      refreshButton.addEventListener('click', scanNetworks);

      form.addEventListener('submit', async function (event) {
         event.preventDefault();
         if (!ssidSelect.value) {
            statusText.textContent = translated('wifiSetup.selectWifi', 'Select your WiFi network.');
            return;
         }

         const body = new URLSearchParams();
         body.set('ssid', ssidSelect.value);
         body.set('password', passwordInput.value);
         statusText.textContent = translated('wifiSetup.saving', 'Saving WiFi settings...');

         try {
            const response = await fetch('/api/wifi/save', {
               method: 'POST',
               headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
               body: body.toString()
            });
            if (!response.ok) {
               throw new Error('Save failed');
            }

            statusText.textContent = translated(
               'wifiSetup.savedRebooting',
               'Saved. Robo-Trickler is rebooting and connecting to your WiFi.'
            );
            form.querySelectorAll('input, select, button').forEach(function (control) {
               control.disabled = true;
            });
         } catch (error) {
            statusText.textContent = translated('wifiSetup.saveFailed', 'Could not save WiFi settings. Try again.');
         }
      });

      document.addEventListener('DOMContentLoaded', function () {
         Promise.resolve(window.rtLanguageReady).then(scanNetworks);
      });
   </script>
</body>

</html>
