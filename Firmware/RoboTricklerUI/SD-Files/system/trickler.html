<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="titles.trickler">Robo-Trickler Interface</title>
    <link rel="icon" type="image/x-icon" href="./resources/favicon.ico">
    <link rel="stylesheet" href="./resources/style.css">
    <script src="./lang.js"></script>
    <style>
        .button-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .button {
            margin: 0 5px;
            padding: 10px 20px;
            font-size: 1.5em;
            flex: 1;
        }

        .display {
            text-align: center !important;
            font-size: 1.5em !important;
            box-sizing: border-box !important;
            margin: 0 5px !important;
            min-width: 150px;
        }

        .display-secondary {
            text-align: center;
            font-size: 2em;
        }

        .button-start {
            background: #28a745;
            /* Green */
        }

        .button-stop {
            background: #dc3545;
            /* Red */
        }
    </style>
</head>

<body>
    <div class="card">
        <fieldset>
            <legend data-i18n="trickler.title">Trickler</legend>
            <fieldset>
                <legend data-i18n="trickler.profile">Profile</legend>
                <select id="dropdownMenu" class="dropdown" onchange="setProfile();">
                </select>
            </fieldset>
            <fieldset>
                <legend data-i18n="trickler.targetWeight">Target Weight</legend>
                <div class="button-row">
                    <button class="button" onclick="decreaseValue()">-</button>
                    <input type="number" class="display" id="targetValueDisplay" value="0.001" step="0.001" min="0.001"
                        max="998.999">
                    <button class="button" onclick="increaseValue()">+</button>
                </div>
            </fieldset>
            <fieldset>
                <legend data-i18n="trickler.weight">Weight</legend>
                <div class="button-row">
                    <input type="number" class="display-secondary" id="weightDisplay" value="0.000" readonly>
                </div>
            </fieldset>
            <div class="button-row">
                <button class="button button-start" id="start-stop-btn" data-i18n="trickler.start" onclick="toggleStartStop()">Start</button>
            </div>
        </fieldset>
        <div class="button-row">
            <button onClick='javascript:history.back()' class="button" data-i18n="nav.back">Back</button>
        </div>
    </div>
    <script>
        const minTargetWeight = 0.001;
        const maxTargetWeight = 998.999;
        const requestTimeoutMs = 3000;
        let tricklerRunning = false;
        let tricklerDataRequestInFlight = false;
        const valueInterval = setInterval(loadValue, 1000);

        function clampTargetValue(value) {
            if (isNaN(value) || value < minTargetWeight) {
                return minTargetWeight;
            }
            if (value > maxTargetWeight) {
                return maxTargetWeight;
            }
            return value;
        }

        document.addEventListener('DOMContentLoaded', function () {
            fetch('/getTarget')
                .then(response => {
                    // Check if the request was successful
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.text(); // Parse the response body as JSON
                })
                .then(data => {
                    console.log(data); // Here you have your data
                    document.getElementById('targetValueDisplay').value = data;
                })
                .catch(error => {
                    console.error('There was a problem with your fetch operation:', error);
                    document.getElementById('targetValueDisplay').value = minTargetWeight.toFixed(3);
                });

            addTxtFilesToDropdown().then(selectActiveProfile);
            loadValue();
        });

        function selectActiveProfile() {
            return fetch('/getProfile')
                .then(response => {
                    // Check if the request was successful
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.text(); // Parse the response body as JSON
                })
                .then(data => {
                    console.log(data); // Here you have your data

                    var objSelect = document.getElementById("dropdownMenu");

                    for (var i = 0; i < objSelect.options.length; i++) {
                        console.log(objSelect.options[i].text);
                        if (objSelect.options[i].text == data) {
                            objSelect.options[i].selected = true;
                            break;
                        }
                    }

                })
                .catch(error => {
                    console.error('There was a problem with your fetch operation:', error);
                });
        }

        function increaseValue() {
            var value = parseFloat(document.getElementById('targetValueDisplay').value);
            value = clampTargetValue(value + 0.001);
            document.getElementById('targetValueDisplay').value = value.toFixed(3);
        }

        function decreaseValue() {
            var value = parseFloat(document.getElementById('targetValueDisplay').value);
            value = clampTargetValue(value - 0.001);
            document.getElementById('targetValueDisplay').value = value.toFixed(3);
        }


        function showTricklerState(running) {
            var btn = document.getElementById('start-stop-btn');
            var profileDropdown = document.getElementById('dropdownMenu');
            tricklerRunning = running;
            profileDropdown.disabled = running;
            if (running) {
                btn.innerText = window.rtT ? rtT('trickler.stop', 'Stop') : "Stop";
                btn.classList.remove("button-start");
                btn.classList.add("button-stop");
            } else {
                btn.innerText = window.rtT ? rtT('trickler.start', 'Start') : "Start";
                btn.classList.remove("button-stop");
                btn.classList.add("button-start");
            }
        }

        function toggleStartStop() {
            var request;
            if (!tricklerRunning) {
                setProfile();
                setTarget();
                request = fetch('./start');
            } else {
                request = fetch('./stop');
            }

            request
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return loadValue();
                })
                .catch(error => {
                    console.error('Could not change trickler state:', error);
                    loadValue();
                });
        }

        function addTxtFilesToDropdown() {
            return fetch('/getProfileList')
                .then(response => {
                    // Check if the request was successful
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json(); // Parse the response body as JSON
                })
                .then(data => {
                    console.log(data); // Here you have your data

                    const dropdown = document.getElementById('dropdownMenu');
                    dropdown.innerHTML = '';
                    Object.values(data).forEach((name, index) => {
                        const option = document.createElement('option');
                        option.value = index; // Use index + 1 as option value to start counting from 1
                        option.textContent = name; // The file name without '.txt' extension is already provided in JSON
                        dropdown.appendChild(option);
                    });
                })
                .catch(error => {
                    console.error('There was a problem with your fetch operation:', error);
                });


        }

        function setProfile() {
            if (tricklerRunning) {
                return;
            }

            var profileNumber = parseFloat(document.getElementById('dropdownMenu').value);
            if (isNaN(profileNumber)) {
                return;
            }
            var url = '/setProfile?profileNumber=' + profileNumber;
            fetch(url).then(response => response.text());
        }


        function loadValue() {
            if (tricklerDataRequestInFlight) {
                return Promise.resolve();
            }

            tricklerDataRequestInFlight = true;
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), requestTimeoutMs);

            return fetch('/getTricklerState', { signal: controller.signal })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    document.getElementById('weightDisplay').value =
                        Number.isFinite(data.weight) ? data.weight : 'NAN';
                    showTricklerState(data.running);
                })
                .catch(error => {
                    if (error.name !== 'AbortError') {
                        console.error('Could not load trickler data:', error);
                    }
                })
                .finally(() => {
                    clearTimeout(timeout);
                    tricklerDataRequestInFlight = false;
                });
        }

        function setTarget() {
            var targetValue = clampTargetValue(parseFloat(document.getElementById('targetValueDisplay').value));
            document.getElementById('targetValueDisplay').value = targetValue.toFixed(3);
            var url = '/setTarget?targetWeight=' + targetValue;
            fetch(url).then(response => response.text());
        }

    </script>
</body>

</html>
