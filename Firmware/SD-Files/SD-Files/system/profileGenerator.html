<!DOCTYPE html>
<html>

<head>
   <meta charset="UTF-8">
   <link rel="icon" type="image/x-icon" href="./resources/favicon.ico">
   <title>Profile Generator</title>
   <link rel="stylesheet" href="./resources/style.css">
   <script src="./lang.js"></script>
</head>

<body>
   <div class="card">
      <h1 data-i18n="profileGenerator.title">Profile Generator</h1>
      <form id="profileForm">
         <fieldset>
            <legend data-i18n="profileGenerator.settings">Profile Settings</legend>
            <label for="weightInput" data-i18n="profileGenerator.calibrationWeight">Weight of calibration run:</label>
            <input type="number" id="weightInput" step="0.0001" min="0" value="40.000"><br>

            <label for="weightGapInput" data-i18n="profileGenerator.weightGap">Weight gap:</label>
            <input type="number" id="weightGapInput" step="0.001" min="0" value="1.000"><br>

            <label for="speedInput" data-i18n="profileGenerator.stepperSpeed">Stepper speed rpm:</label>
            <input type="number" id="speedInput" step="1" min="5" value="200"><br>

            <label for="measurementsInput" data-i18n="profileGenerator.measurements">General measurements (with PLC 100-BC use 5):</label>
            <input type="number" id="measurementsInput" step="1" min="1" value="2"><br>

            <label for="calcToleranceInput" data-i18n="profileGenerator.calcTolerance">Calculation tolerance in %:</label>
            <input type="number" id="calcToleranceInput" step="1" min="1" max="100" value="65"><br>

            <fieldset>
               <legend data-i18n="profileGenerator.trickler">Trickler</legend>
               <label for="reverseCheckbox" data-i18n="profileGenerator.reverse">Reverse:</label>
               <input type="checkbox" id="reverseCheckbox"><br>
            </fieldset>

            <fieldset>
               <legend data-i18n="profileGenerator.unit">Unit</legend>
               <label for="gramRadio" data-i18n="profileGenerator.gram">Gram:</label>
               <input type="radio" id="gramRadio" name="weightUnit" value="Gram"><br>

               <label for="grainRadio" data-i18n="profileGenerator.grain">Grain:</label>
               <input type="radio" id="grainRadio" name="weightUnit" value="Grain" checked><br>
            </fieldset>

            <label for="alarmThresholdInput" data-i18n="profileGenerator.alarmThreshold">Threshold for alarm:</label>
            <input type="number" id="alarmThresholdInput" step="0.001" min="0" value="1.000"><br>

            <label for="toleranceInput" data-i18n="profileGenerator.tolerance">Tolerance:</label>
            <input type="number" id="toleranceInput" step="0.001" min="0" value="0.0"><br>

         </fieldset>
      </form>

      <button id="generateButton" class="button" data-i18n="profileGenerator.generate">Generate Profile</button><br><br>
      <h2 data-i18n="profileGenerator.generated">Generated Profile:</h2>
      <textarea id="profileOutput" rows="20" cols="40"></textarea><br>

      <label for="profileName" data-i18n="profileGenerator.profileName">Profile Name:</label>
      <input type="text" id="profileName" value="powder" maxlength="16" required
         title="Filename must not contain < > : \" / \\ | ? *"><br>
      <button id="download-btn" class="button" data-i18n="profileGenerator.download">Download</button><br><br>
      <button id="save-btn" class="button" data-i18n="profileGenerator.save">Save</button><br><br>
      <button onClick='javascript:history.back()' class="button" data-i18n="nav.back">Back</button>
   </div>


   <script>
      var profileJSON;

      function numberValue(id, fallback) {
         const value = parseFloat(document.getElementById(id).value);
         return isNaN(value) ? fallback : value;
      }

      document.getElementById("generateButton").addEventListener("click", function () {
         const measuredWeight = numberValue("weightInput", 0);
         const targetWeight = 40.000;
         const speed = numberValue("speedInput", 200);
         const reverse = document.getElementById("reverseCheckbox").checked; // Get the checkbox value

         const weightUnit = document.querySelector('input[name="weightUnit"]:checked').value;
         const tolerance = numberValue("toleranceInput", 0);
         const alarmThreshold = numberValue("alarmThresholdInput", weightUnit === "Grain" ? 1 : 0.1);
         const weightGap = numberValue("weightGapInput", weightUnit === "Grain" ? 1 : 0.1);
         const calcTolerance = numberValue("calcToleranceInput", 65);
         var measurement = Math.round(numberValue("measurementsInput", 5));




         if (!isNaN(measuredWeight) && measuredWeight > 0) {
            const profile = {
               general: {
                  targetWeight: parseFloat(targetWeight.toFixed(3)),
                  tolerance: parseFloat(tolerance.toFixed(3)),
                  alarmThreshold: parseFloat(alarmThreshold.toFixed(3)),
                  weightGap: parseFloat(weightGap.toFixed(3)),
                  measurements: 20
               },
               actuator: {
                  stepper1: {
                     enabled: true,
                     unitsPerThrow: parseFloat((measuredWeight / 100).toFixed(3)),
                     unitsPerThrowSpeed: speed
                  },
                  stepper2: {
                     enabled: false,
                     unitsPerThrow: 10.000,
                     unitsPerThrowSpeed: 200
                  }
               },
               rs232TrickleMap: []
            };

            // Define the conversion factor from grams to grains
            const gramToGrain = 15.4323583529;

            // Define the diff-weight map in grams.
            let weights = [0.125, 0.0625, 0.03125, 0.015625, 0.000];

            // Convert weights to grains if Grain is selected
            if (weightUnit === "Grain") {
               weights = weights.map(weight => weight * gramToGrain);
            }

            weights = weights.map(weight => parseFloat(weight.toFixed(3)));

            var measurements = measurement;
            const mapMeasurements = [2, 2, 5, 10, 15];

            // Loop through each weight value and calculate the profile
            for (let i = 0; i < weights.length; i++) {
               const weight = weights[i];
               var steps = Math.round((weight / measuredWeight) * ((20000 / 100) * calcTolerance));
               if (steps < 5)
                  steps = 5;

               measurements = mapMeasurements[i] || measurement;

               const profileEntry = {
                  diffWeight: weight,
                  actuator: "stepper1",
                  steps: steps,
                  speed: speed,
                  reverse: reverse,
                  measurements: measurements
               };

               profile.rs232TrickleMap.push(profileEntry);
            }

            // Convert the profile object to JSON format
            profileJSON = JSON.stringify(profile, null, 4);


            document.getElementById("profileOutput").value = profileJSON;
         }
      });

      function convertToLegalFAT32Filename(filename) {
         // Truncate if length is more than 255 characters
         let legalFilename = filename.slice(0, 255);

         // Replace illegal characters
         legalFilename = legalFilename.replace(/[<>:"/\\|?*]/g, '_');

         // List of reserved names
         const reservedNames = [
            "CON", "PRN", "AUX", "NUL",
            "COM1", "COM2", "COM3", "COM4", "COM5", "COM6", "COM7", "COM8", "COM9",
            "LPT1", "LPT2", "LPT3", "LPT4", "LPT5", "LPT6", "LPT7", "LPT8", "LPT9"
         ];

         // Check for reserved names
         const upperFilename = legalFilename.toUpperCase();
         if (reservedNames.includes(upperFilename) || /^COM\d$/.test(upperFilename) || /^LPT\d$/.test(upperFilename)) {
            legalFilename += "_file";
         }

         return legalFilename;
      }

      document.getElementById("download-btn").addEventListener("click", function () {
         const fileName = document.getElementById('profileName').value;
         // Get the content from the textarea
         var text = document.getElementById('profileOutput').value;

         // Convert the content to a Blob
         var blob = new Blob([text], { type: 'text/plain' });

         // Create a download link
         var downloadLink = document.createElement('a');
         downloadLink.href = window.URL.createObjectURL(blob);
         downloadLink.download = convertToLegalFAT32Filename(fileName.toLowerCase() + '.txt');

         // Append the link to the body, click it, and then remove it
         document.body.appendChild(downloadLink);
         downloadLink.click();
         document.body.removeChild(downloadLink);
      }, false);

      document.getElementById("save-btn").addEventListener("click", function () {
         const fileName = convertToLegalFAT32Filename(document.getElementById('profileName').value.toLowerCase() + '.txt');
         const text = document.getElementById('profileOutput').value;
         httpPost("/profiles/" + fileName, text);
      }, false);

      function httpPostProcessRequest() {
         if (xmlHttp.readyState == 4) {
            if (xmlHttp.status == 200)
               alert(window.rtT ? rtT('alerts.profileSaved', 'Profile saved!') : "Profile saved!");
            else
               alert("ERROR[" + xmlHttp.status + "]: " + xmlHttp.responseText);
         }
      }

      function httpPost(filename, data) {
         xmlHttp = new XMLHttpRequest();
         xmlHttp.onreadystatechange = httpPostProcessRequest;
         var formData = new FormData();
         formData.append("data", new Blob([data], { type: "text/json" }), filename);
         xmlHttp.open("POST", "/system/resources/edit");
         xmlHttp.send(formData);
      }

      window.addEventListener("load", (event) => {
         if (location.hostname === "localhost" || location.hostname === "127.0.0.1" || location.hostname === "" || location.hostname === "strenuous.dev") {
            document.getElementById("save-btn").style.display = "none";
         } else {
            document.getElementById("download-btn").style.display = "none";
         }
      });

      document.getElementById("gramRadio").addEventListener("click", function () {
         document.querySelector("label[for=alarmThresholdInput]").innerHTML = "Threshold for alarm in Gram:";
         document.getElementById("alarmThresholdInput").value = 0.100;
         document.querySelector("label[for=weightGapInput]").innerHTML = "Weight gap in Gram:";
         document.getElementById("weightGapInput").value = 0.100;
         document.querySelector("label[for=toleranceInput]").innerHTML = "Tolerance in Gram:";
      });

      document.getElementById("grainRadio").addEventListener("click", function () {
         document.querySelector("label[for=alarmThresholdInput]").innerHTML = "Threshold for alarm in Grain:";
         document.getElementById("alarmThresholdInput").value = 1.000;
         document.querySelector("label[for=weightGapInput]").innerHTML = "Weight gap in Grain:";
         document.getElementById("weightGapInput").value = 1.000;
         document.querySelector("label[for=toleranceInput]").innerHTML = "Tolerance in Grain:";
      });


   </script>
</body>

</html>
